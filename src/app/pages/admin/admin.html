<div class="admin-container">
  <header class="admin-header">
    <div class="header-main">
      <h1>Panel de Administración 🛠️</h1>
      <div class="admin-tabs">
        <button [class.active]="activeTab() === 'upload'" (click)="setTab('upload')">
          ⬆️ Subir
        </button>
        <button [class.active]="activeTab() === 'manage'" (click)="setTab('manage')">
          🎬 Videos
        </button>
        <button [class.active]="activeTab() === 'feedback'" (click)="setTab('feedback')">
          📝 Reportes
        </button>
        <button [class.active]="activeTab() === 'users'" (click)="setTab('users')">
          👥 Usuarios
        </button>
        <button [class.active]="activeTab() === 'requests'" (click)="setTab('requests')">
          ✨ Solicitudes
        </button>
        <button class="btn-logout" (click)="logout()" title="Cerrar Sesión">
          🚪 Salir
        </button>
      </div>
    </div>
    <p>Administra tu contenido y mantén el catálogo actualizado.</p>
  </header>

  <div class="admin-content">
    @if (activeTab() === 'upload') {
      <app-admin-upload 
        [editingVideo]="editingVideo()"
        (clearEditing)="setEditingVideo(null)"
        (videoSaved)="setEditingVideo($event)"
      ></app-admin-upload>
    }

    @if (activeTab() === 'manage') {
      <app-admin-manage 
        (editVideo)="setEditingVideo($event)"
      ></app-admin-manage>
    }

    @if (activeTab() === 'feedback') {
      <app-admin-feedback></app-admin-feedback>
    }

    @if (activeTab() === 'users') {
      <app-admin-users></app-admin-users>
    }

    @if (activeTab() === 'requests') {
      <app-admin-requests></app-admin-requests>
    }
  </div>
</div>
