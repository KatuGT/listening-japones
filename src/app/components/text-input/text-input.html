<div class="form-control-group">
  <label *ngIf="label">{{ label }} <span *ngIf="required">*</span></label>
  <input
    [attr.name]="name"
    [type]="type"
    [attr.placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [attr.maxlength]="maxLength"
    [value]="value"
    (input)="_onInput($event)"
    (blur)="_onBlur()"
    class="app-text-input"
  />
</div>
