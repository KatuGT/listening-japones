@if (routerLink) {
  <a
    [routerLink]="routerLink"
    [ngClass]="classes"
    [attr.target]="target"
    [attr.aria-disabled]="disabled"
    (click)="disabled && $event.preventDefault()"
  >
    <ng-content></ng-content>
  </a>
} @else {
  <button
    [type]="type"
    [disabled]="disabled"
    [ngClass]="classes"
  >
    <ng-content></ng-content>
  </button>
}
