<div class="form-control-group">
  @if (label) {
    <label>{{ label }} @if (required) { <span>*</span> }</label>
  }
  <textarea
    [attr.name]="name"
    [attr.placeholder]="placeholder"
    [required]="required"
    [disabled]="disabled"
    [rows]="rows"
    [attr.maxlength]="maxLength"
    [value]="value"
    (input)="_onInput($event)"
    (blur)="_onBlur()"
    class="app-textarea-input"
  ></textarea>
</div>
